<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" fill="#080e1a"/>

  <!-- Subtle inner border -->
  <rect x="24" y="24" width="464" height="464" rx="48" fill="none" stroke="#1d2c4a" stroke-width="2"/>

  <!-- Stylised candlestick chart in the upper area -->
  <g transform="translate(80,90)">
    <!-- Wick + body, alternating green/red -->
    <line x1="20"  y1="40"  x2="20"  y2="120" stroke="#26a96c" stroke-width="3"/>
    <rect x="12" y="60"  width="16" height="50" fill="#26a96c"/>

    <line x1="60"  y1="20"  x2="60"  y2="100" stroke="#26a96c" stroke-width="3"/>
    <rect x="52" y="35"  width="16" height="60" fill="#26a96c"/>

    <line x1="100" y1="50"  x2="100" y2="130" stroke="#e0524d" stroke-width="3"/>
    <rect x="92"  y="70"  width="16" height="50" fill="#e0524d"/>

    <line x1="140" y1="10"  x2="140" y2="80"  stroke="#26a96c" stroke-width="3"/>
    <rect x="132" y="20"  width="16" height="55" fill="#26a96c"/>

    <line x1="180" y1="0"   x2="180" y2="60"  stroke="#26a96c" stroke-width="3"/>
    <rect x="172" y="10"  width="16" height="40" fill="#c9a84c"/>

    <line x1="220" y1="-10" x2="220" y2="50"  stroke="#26a96c" stroke-width="3"/>
    <rect x="212" y="-5"  width="16" height="50" fill="#c9a84c"/>

    <line x1="260" y1="20"  x2="260" y2="90"  stroke="#e0524d" stroke-width="3"/>
    <rect x="252" y="35"  width="16" height="45" fill="#e0524d"/>

    <line x1="300" y1="-30" x2="300" y2="40"  stroke="#26a96c" stroke-width="3"/>
    <rect x="292" y="-25" width="16" height="55" fill="#26a96c"/>

    <line x1="340" y1="-40" x2="340" y2="20"  stroke="#26a96c" stroke-width="3"/>
    <rect x="332" y="-35" width="16" height="45" fill="#26a96c"/>
  </g>

  <!-- Trend line (gold, MA-like) -->
  <path d="M 80 230 Q 200 210, 320 180 T 432 130" fill="none" stroke="#c9a84c" stroke-width="4" stroke-linecap="round"/>

  <!-- FJC monogram -->
  <text x="256" y="370" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-weight="700" font-size="120"
        fill="#c9a84c" letter-spacing="6">FJC</text>

  <!-- TRADING LAB label -->
  <text x="256" y="430" text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-weight="600" font-size="34"
        fill="#f0e6c8" letter-spacing="8">TRADING LAB</text>

  <!-- Bottom accent -->
  <rect x="120" y="455" width="272" height="4" rx="2" fill="#c9a84c"/>
</svg>
